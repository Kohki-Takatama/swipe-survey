<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Daily Check-in</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;
  --accent:#007aff;--green:#34c759;--red:#ff3b30;--border:#e5e5ea;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
#app{width:100%;max-width:430px;height:100%;margin:0 auto;position:relative;overflow:hidden;}
#pbar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);z-index:99;}
#pfill{height:100%;background:var(--accent);transition:width .45s ease;width:0;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 28px calc(72px + env(safe-area-inset-bottom));opacity:0;transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .38s ease;pointer-events:none;}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all;}
.screen.leaving{opacity:0;transform:translateX(-48px);}
.screen.scrollable{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.q-num{font-size:13px;color:var(--sub);letter-spacing:.06em;margin-bottom:14px;font-weight:500;}
.q-text{font-size:22px;font-weight:700;text-align:center;line-height:1.45;margin-bottom:48px;}
.swipe-zone{width:100%;height:230px;position:relative;display:flex;align-items:center;justify-content:center;}
.swipe-badge{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;letter-spacing:.04em;opacity:0;transition:opacity .1s;pointer-events:none;padding:8px 16px;border-radius:10px;}
.badge-yes{right:8px;color:var(--green);background:rgba(52,199,89,.12);}
.badge-no{left:8px;color:var(--red);background:rgba(255,59,48,.12);}
.swipe-card{width:230px;height:190px;background:var(--card);border-radius:28px;box-shadow:0 10px 36px rgba(0,0,0,.09),0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none;touch-action:none;position:relative;z-index:2;will-change:transform;}
.swipe-card:active{cursor:grabbing;}
.swipe-emoji{font-size:54px;pointer-events:none;}
.swipe-guide{font-size:13px;color:var(--sub);margin-top:20px;letter-spacing:.02em;}
.dial-row{display:flex;align-items:flex-start;justify-content:center;gap:4px;}
.dial-sep{font-size:24px;font-weight:700;color:var(--sub);height:280px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.drum-col{display:flex;flex-direction:column;align-items:center;gap:10px;}
.drum-wrap{width:200px;height:280px;position:relative;overflow:hidden;cursor:ns-resize;touch-action:none;user-select:none;}
.drum-wrap.compact{width:120px;}
.drum-hl{position:absolute;top:50%;left:12px;right:12px;transform:translateY(-50%);height:56px;border-radius:14px;background:rgba(0,122,255,.07);border:1.5px solid var(--accent);pointer-events:none;z-index:2;}
.drum-fade{position:absolute;left:0;right:0;pointer-events:none;z-index:3;}
.drum-fade.top{top:0;height:96px;background:linear-gradient(to bottom,var(--bg) 20%,transparent);}
.drum-fade.bot{bottom:0;height:96px;background:linear-gradient(to top,var(--bg) 20%,transparent);}
.drum-track{position:absolute;left:0;right:0;top:0;will-change:transform;}
.drum-item{height:56px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:var(--sub);pointer-events:none;}
.drum-item.sel{font-size:28px;font-weight:700;color:var(--text);}
.drum-unit{font-size:15px;color:var(--sub);font-weight:500;}
.tap-row{display:flex;gap:10px;}
.tap-btn{width:58px;height:58px;border-radius:18px;border:2px solid var(--border);background:var(--card);font-size:19px;font-weight:600;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.06);outline:none;touch-action:manipulation;}
.tap-btn:active{transform:scale(.91);}
.tap-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.13);box-shadow:0 6px 20px rgba(0,122,255,.38);}
.multi-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:320px;}
.multi-chip{padding:10px 20px;border-radius:20px;border:2px solid var(--border);background:var(--card);font-size:15px;color:var(--sub);cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.05);outline:none;touch-action:manipulation;}
.multi-chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(0,122,255,.3);}
.multi-note{font-size:12px;color:var(--sub);margin-top:16px;letter-spacing:.02em;}
.scrub-container{width:100%;background:var(--border);border-radius:18px;position:relative;height:68px;touch-action:none;user-select:none;}
.scrub-indicator{position:absolute;height:60px;top:4px;border-radius:14px;background:var(--accent);box-shadow:0 4px 16px rgba(0,122,255,.38);pointer-events:none;opacity:0;transition:left .1s;}
.scrub-items{display:flex;height:100%;position:relative;z-index:1;}
.scrub-item{flex:1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--sub);transition:color .12s,transform .12s;pointer-events:none;}
.scrub-item.sel{color:#fff;transform:scale(1.12);}
.burst-area{display:flex;flex-direction:column;align-items:center;gap:14px;}
.burst-count-disp{font-size:60px;font-weight:800;color:var(--text);line-height:1;text-align:center;}
.burst-max-lbl{font-size:14px;color:var(--sub);margin-top:-6px;text-align:center;}
.burst-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
.burst-ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.burst-ring-bg{fill:none;stroke:var(--border);stroke-width:5;}
.burst-ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;}
.burst-btn{position:absolute;inset:8px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;outline:none;box-shadow:0 6px 22px rgba(0,122,255,.35);transition:transform .08s;}
.burst-btn:active{transform:scale(.86);}
.burst-hint{font-size:13px;color:var(--sub);letter-spacing:.02em;min-height:1.5em;text-align:center;}
.burst-particle{position:absolute;font-size:24px;pointer-events:none;left:50%;top:50%;animation:burst-fly .65s ease-out forwards;}
@keyframes burst-fly{0%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.2);opacity:0;}}
@keyframes burst-pop{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
.burst-pop{animation:burst-pop .13s ease;}
.act-btn{background:var(--accent);color:#fff;border:none;border-radius:18px;padding:17px 60px;font-size:17px;font-weight:600;cursor:pointer;margin-top:52px;letter-spacing:.02em;transition:transform .12s,box-shadow .15s;box-shadow:0 4px 18px rgba(0,122,255,.32);outline:none;touch-action:manipulation;}
.act-btn:active{transform:scale(.96);}
.done-wrap{text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;padding-bottom:24px;}
.done-icon{font-size:72px;margin-bottom:24px;}
.done-title{font-size:28px;font-weight:800;margin-bottom:10px;}
.done-sub{font-size:15px;color:var(--sub);margin-bottom:28px;line-height:1.7;white-space:pre-line;}
.done-answers{background:var(--card);border-radius:18px;padding:4px 16px;margin-bottom:36px;width:100%;max-width:360px;min-width:260px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.done-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);font-size:15px;min-height:52px;gap:8px;}
.done-row:last-of-type{border-bottom:none;}
.done-key{color:var(--sub);flex:1 1 0;min-width:0;word-break:break-word;}
.done-val{font-weight:600;flex-shrink:0;min-width:48px;max-width:55%;text-align:right;word-break:break-word;}
.reset-btn{background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:16px;padding:14px 44px;font-size:16px;font-weight:600;cursor:pointer;outline:none;transition:background .15s;touch-action:manipulation;}
.reset-btn:active{background:rgba(0,122,255,.08);}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.shake{animation:shake .3s ease;}
#update-banner{position:absolute;top:3px;left:0;right:0;z-index:98;background:var(--accent);color:#fff;font-size:13px;font-weight:600;letter-spacing:.02em;padding:10px 16px;text-align:center;cursor:pointer;transform:translateY(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
#update-banner.show{transform:translateY(0);}
#cloud-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--bg);z-index:100;padding-bottom:calc(56px + env(safe-area-inset-bottom));}
#cloud-overlay.hidden{display:none;}
.cloud-spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cloud-msg{font-size:15px;color:var(--sub);}
.cloud-retry{margin-top:8px;padding:13px 36px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
#setup-screen{position:absolute;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:32px 32px calc(32px + 56px + env(safe-area-inset-bottom));}
#setup-screen.hidden{display:none;}
.setup-inner{width:100%;max-width:320px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.setup-icon{font-size:48px;}
.setup-title{font-size:20px;font-weight:700;}
.setup-desc{font-size:14px;color:var(--sub);text-align:center;line-height:1.7;}
.setup-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:14px;font-size:13px;background:var(--card);color:var(--text);outline:none;}
.setup-input:focus{border-color:var(--accent);}
.setup-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;}
.setup-err{font-size:13px;color:var(--red);min-height:1.4em;}
#settings-btn{position:absolute;top:10px;right:12px;font-size:17px;opacity:0.25;cursor:pointer;background:none;border:none;z-index:97;padding:6px;color:var(--text);}
/* ボトムタブバー */
#tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom));background:rgba(242,242,247,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:96;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--sub);font-size:10px;font-weight:500;cursor:pointer;transition:color .15s;padding:0;outline:none;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:20px;line-height:1;}
.tab-label{font-size:10px;letter-spacing:.03em;}
/* 編集パネル */
#edit-panel{position:absolute;inset:0;bottom:calc(56px + env(safe-area-inset-bottom));background:var(--bg);z-index:90;display:flex;flex-direction:column;overflow:hidden;}
#edit-panel.hidden{display:none;}
.edit-loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px;color:var(--sub);}
.edit-loading.hidden{display:none;}
#edit-content{flex:1;overflow-y:auto;padding:16px 16px 8px;}
#edit-footer{padding:12px 16px;border-top:1px solid var(--border);background:rgba(242,242,247,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.eq-card{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:12px 14px;border:1.5px solid var(--border);margin-bottom:10px;}
.eq-badge{font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 8px;border-radius:6px;color:#fff;white-space:nowrap;flex-shrink:0;}
.eq-label{flex:1;font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.eq-meta{font-size:12px;color:var(--sub);flex-shrink:0;}
.eq-controls{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--sub);}
.icon-btn.del{color:#ff3b30;}
.add-btn{width:100%;padding:14px;border-radius:14px;border:2px dashed var(--border);background:transparent;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.eq-form{background:var(--card);border-radius:18px;padding:16px;margin-top:12px;}
.eq-form.hidden{display:none;}
.form-row{margin-bottom:12px;}
.form-label{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px;display:block;}
.form-input,.form-select{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.type-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.type-tab{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);}
.type-tab.sel{color:#fff;border-color:transparent;background:var(--accent);}
.form-actions{display:flex;gap:10px;margin-top:14px;}
.btn-confirm{flex:1;padding:13px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:13px 18px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;}
.eq-save-btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(0,122,255,.3);}
.eq-save-btn:disabled{opacity:.5;cursor:default;}
.eq-empty{text-align:center;color:var(--sub);font-size:14px;padding:32px 0;}
.badge-swipe{background:#34c759;}
.badge-dial{background:#007aff;}
.badge-tap{background:#ff9500;}
.badge-multi{background:#af52de;}
.badge-burst{background:#ff2d55;}
.badge-body{background:#00c7be;}
.badge-head{background:#ff6b6b;}
/* body 設問タイプ */
.body-map-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
.body-view-toggle{display:flex;gap:6px;}
.body-view-btn{padding:7px 18px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .15s;touch-action:manipulation;}
.body-view-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.body-svg-wrap{position:relative;width:160px;height:310px;}
.body-zone{fill:var(--border);stroke:#fff;stroke-width:1.5;cursor:pointer;transition:fill .15s;-webkit-tap-highlight-color:transparent;}
.body-zone:hover{fill:#c7e0ff;}
.body-zone.sel{fill:var(--accent);}
.body-note{font-size:12px;color:var(--sub);letter-spacing:.02em;}
.screen.done-screen{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:72px;}
/* メモ */
.memo-btn{position:absolute;bottom:calc(72px + env(safe-area-inset-bottom) + 12px);left:20px;width:36px;height:36px;border-radius:10px;border:none;background:transparent;font-size:20px;cursor:pointer;color:var(--sub);touch-action:manipulation;transition:color .15s;-webkit-tap-highlight-color:transparent;}
.memo-btn.has-memo{color:var(--accent);}
.memo-sheet{position:absolute;left:0;right:0;bottom:calc(56px + env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--border);border-radius:18px 18px 0 0;padding:16px;z-index:50;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1),visibility 0s .3s;visibility:hidden;pointer-events:none;}
.memo-sheet.open{transform:translateY(0);transition:transform .3s cubic-bezier(.4,0,.2,1),visibility 0s;visibility:visible;pointer-events:all;}
.memo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:49;opacity:0;pointer-events:none;transition:opacity .3s ease;}
.memo-overlay.open{opacity:1;pointer-events:all;}
.memo-sheet-input{width:100%;min-height:80px;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;resize:none;outline:none;font-family:inherit;line-height:1.5;}
.memo-sheet-input:focus{border-color:var(--accent);}
.memo-sheet-close{display:block;margin-top:10px;width:100%;padding:12px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
.done-memo-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:0 0 0 8px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.done-memo-row{padding:8px 0 4px;}
.done-memo-row .memo-sheet-input{min-height:56px;}
/* done 画面再設計 */
.done-note{font-size:13px;color:var(--sub);text-align:center;line-height:1.7;padding:12px 16px;background:rgba(0,122,255,.06);border-radius:12px;margin-bottom:20px;width:100%;max-width:360px;}
.done-actions{display:flex;gap:10px;width:100%;max-width:300px;margin-top:16px;}
.done-retry-btn{flex:1;padding:14px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;}
.done-submit-btn{flex:2;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(0,122,255,.3);touch-action:manipulation;}
.done-submit-btn:disabled{opacity:.5;cursor:default;}
.done-status{font-size:15px;font-weight:700;margin-top:14px;min-height:1.5em;text-align:center;color:var(--green);}
/* 設定パネル */
#settings-panel{position:absolute;inset:0;bottom:calc(56px + env(safe-area-inset-bottom));background:var(--bg);z-index:90;display:flex;flex-direction:column;overflow:hidden;}
#settings-panel.hidden{display:none;}
#settings-content{flex:1;overflow-y:auto;padding:24px 16px 16px;}
.settings-section{background:var(--card);border-radius:18px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.settings-section-title{font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;}
.settings-value{font-size:16px;color:var(--text);font-weight:500;}
.settings-value-url{font-size:12px;color:var(--sub);word-break:break-all;margin-bottom:10px;line-height:1.5;}
.settings-edit-btn{padding:9px 18px;border-radius:10px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;}
#settings-btn { display: none !important; }
#splash-screen{position:absolute;inset:0;background:var(--bg);z-index:350;display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity .35s ease;}
#splash-screen.fade-out{opacity:0;pointer-events:none;}
#splash-screen.hidden{display:none;}
.splash-inner{display:flex;flex-direction:column;align-items:center;gap:12px;}
.splash-icon{font-size:64px;animation:splash-pop .4s cubic-bezier(.34,1.56,.64,1);}
.splash-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:.02em;}
.splash-sub{font-size:14px;color:var(--sub);}
@keyframes splash-pop{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
/* ノートブック一覧 */
#nb-list{position:absolute;inset:0;bottom:calc(56px + env(safe-area-inset-bottom));background:var(--bg);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:60px 20px 24px;display:flex;flex-direction:column;}
#nb-list.hidden{display:none;}
.nb-header{text-align:center;margin-bottom:28px;}
.nb-title{font-size:26px;font-weight:800;color:var(--text);}
.nb-subtitle{font-size:14px;color:var(--sub);margin-top:4px;}
.nb-card{background:var(--card);border-radius:18px;padding:18px 20px;margin-bottom:12px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px;touch-action:manipulation;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;}
.nb-card:active{transform:scale(.97);}
.nb-card.nb-done{opacity:.5;}
.nb-card-emoji{font-size:28px;flex-shrink:0;}
.nb-card-info{flex:1;}
.nb-card-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.nb-card-meta{font-size:13px;color:var(--sub);}
.nb-card-check{font-size:20px;color:var(--green);flex-shrink:0;}
.done-list-btn{width:100%;max-width:300px;padding:14px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;margin-top:10px;}
/* 設問編集モーダル */
.eq-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s ease;}
.eq-modal-overlay.open{opacity:1;pointer-events:all;}
.eq-modal{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;z-index:301;max-height:88vh;display:none;flex-direction:column;overflow:hidden;}
.eq-modal.open{display:flex;animation:eq-slide-up .35s cubic-bezier(.4,0,.2,1) forwards;}
.eq-modal.closing{display:flex;animation:eq-slide-down .3s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes eq-slide-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes eq-slide-down{from{transform:translateY(0);}to{transform:translateY(100%);}}
.eq-modal-grip{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 6px;flex-shrink:0;}
.eq-modal-header{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.eq-form-title{font-size:16px;font-weight:700;color:var(--text);}
.eq-modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);color:var(--sub);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.eq-modal-body{overflow-y:auto;padding:16px 20px calc(32px + env(safe-area-inset-bottom));flex:1;}
</style>
</head>
<body>
<div id="app">
  <div id="splash-screen">
    <div class="splash-inner">
      <div class="splash-icon">✅</div>
      <div class="splash-title">Daily Check-in</div>
      <div class="splash-sub">毎日の記録</div>
    </div>
  </div>
  <div id="pbar"><div id="pfill"></div></div>
  <div id="update-banner" onclick="applyCloudUpdate()">設問が更新されました ↻ タップして反映</div>
  <button id="settings-btn" onclick="showSetupScreen(true)">⚙️</button>
  <div id="nb-list" class="hidden"></div>
  <div id="screens"></div>
  <div id="cloud-overlay">
    <div class="cloud-spinner" id="cloud-spinner"></div>
    <div class="cloud-msg" id="cloud-msg">設問を読み込み中…</div>
    <button class="cloud-retry" id="cloud-retry" style="display:none" onclick="retryCloudLoad()">再試行</button>
  </div>
  <div id="setup-screen" class="hidden">
    <div class="setup-inner">
      <div class="setup-icon">⚙️</div>
      <div class="setup-title">GAS URL の設定</div>
      <p class="setup-desc">Google Apps Script の URL を入力してください。<br>一度設定すると次回から自動で読み込まれます。</p>
      <input type="url" id="gas-url-input" class="setup-input"
        placeholder="https://script.google.com/macros/s/..." autocomplete="off" spellcheck="false">
      <div class="setup-err" id="setup-err"></div>
      <button class="setup-btn" onclick="saveGasUrl()">保存して開始</button>
    </div>
  </div>
  <!-- ボトムタブバー -->
  <div id="tab-bar">
    <button class="tab-btn active" id="tab-answer" onclick="switchTab('answer')">
      <span class="tab-icon">✓</span>
      <span class="tab-label">回答</span>
    </button>
    <button class="tab-btn" id="tab-edit" onclick="switchTab('edit')">
      <span class="tab-icon">✎</span>
      <span class="tab-label">設問</span>
    </button>
    <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
      <span class="tab-icon">⚙️</span>
      <span class="tab-label">設定</span>
    </button>
  </div>
  <!-- 編集モードパネル -->
  <div id="edit-panel" class="hidden">
    <div id="edit-loading" class="edit-loading hidden">
      <div class="cloud-spinner"></div>
      <span>読み込み中...</span>
    </div>
    <div id="edit-content">
      <div id="eq-list"></div>
      <button class="add-btn" id="eq-add-btn">＋ 設問を追加</button>
    </div>
    <div id="edit-footer">
      <button id="eq-save-btn" class="eq-save-btn" onclick="saveQuestions()">GASに保存する</button>
    </div>
  </div>
  <!-- 設定パネル -->
  <div id="settings-panel" class="hidden">
    <div id="settings-content">
      <div class="settings-section">
        <div class="settings-section-title">最終回答日時</div>
        <div id="settings-last-answer" class="settings-value">取得中...</div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">GAS URL</div>
        <div id="settings-gas-url" class="settings-value-url"></div>
        <button class="settings-edit-btn" onclick="showSetupScreen(true); switchTab('answer');">変更</button>
      </div>
    </div>
  </div>
  <!-- 設問編集モーダル -->
  <div id="eq-modal-overlay" class="eq-modal-overlay"></div>
  <div id="eq-modal" class="eq-modal">
    <div class="eq-modal-grip"></div>
    <div class="eq-modal-header">
      <div class="eq-form-title" id="eq-form-title">＋ 設問を追加</div>
      <button class="eq-modal-close" onclick="closeEditForm()">✕</button>
    </div>
    <div class="eq-modal-body">
      <div class="form-row">
        <label class="form-label">タイプ</label>
        <div class="type-tabs" id="eq-type-tabs">
          <button class="type-tab sel" data-t="swipe">swipe</button>
          <button class="type-tab" data-t="dial">dial</button>
          <button class="type-tab" data-t="tap">tap</button>
          <button class="type-tab" data-t="multi">multi</button>
          <button class="type-tab" data-t="burst">burst</button>
          <button class="type-tab" data-t="body">body</button>
          <button class="type-tab" data-t="head">head</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">ラベル</label>
        <input class="form-input" id="eq-label" type="text" placeholder="例：今日は調子がいい">
      </div>
      <div id="eq-type-params"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeEditForm()">キャンセル</button>
        <button class="btn-confirm" id="eq-confirm-btn" onclick="confirmEditForm()">追加する</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="src/app.js"></script>
</body>
</html>
